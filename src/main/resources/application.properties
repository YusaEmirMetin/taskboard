spring.application.name=taskboard
# PostgreSQL Bağlantı Adresi ve Şifreleri
spring.datasource.url=jdbc:postgresql://localhost:5433/taskboard
spring.datasource.username=admin
spring.datasource.password=admin123


# JPA / Hibernate Ayarları (Java objelerimizi tabloya çevirecek sihir)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
./mvnw spring-boot:run

# Redis Ayarları
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka Ayarları
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=taskboard-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest


# Elasticsearch Ayarları
spring.elasticsearch.uris=http://localhost:9200
